---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-history-service
  labels:
    app: catalog-history-service
spec:
  template:
    spec:
      containers:
        - name: catalog-history-service
          env:
            - name: PROJECT_ID_GCP
              valueFrom:
                secretKeyRef:
                  name: common
                  key: PROJECT_ID
            - name: POSTGRESQL_HOST
              valueFrom:
                secretKeyRef:
                  name: postgres
                  key: HOST
            - name: POSTGRESQL_PORT
              valueFrom:
                secretKeyRef:
                  name: postgres
                  key: PORT
            - name: POSTGRESQL_DB
              valueFrom:
                secretKeyRef:
                  name: catalog-history-service
                  key: POSTGRESQL_DB
            - name: POSTGRESQL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: catalog-history-service
                  key: POSTGRESQL_USER
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: catalog-history-service
                  key: POSTGRESQL_PASSWORD
            - name: SSO_BASE_URI
              valueFrom:
                secretKeyRef:
                  name: keycloak
                  key: KEYCLOAK_BASE_URI
            - name: CORS_ORIGIN_PATTERNS
              value: https://*.demo.fellesdatakatalog.digdir.no
