version: "3"
services:

  mongodb:
    image: mongo:8.0
    environment:
      - MONGO_INITDB_DATABASE=catalogHistory
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - ./test/init-mongo/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
